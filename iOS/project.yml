name: Trimline
options:
  bundleIdPrefix: com.shimondeitel.trimline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Trimline:
    type: application
    platform: iOS
    sources:
      - path: Trimline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trimline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Trimline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TrimlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrimlineTests
      - path: Trimline.storekit
    dependencies:
      - target: Trimline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trimline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TrimlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TrimlineUITests
    dependencies:
      - target: Trimline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trimline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Trimline:
    build:
      targets:
        Trimline: all
        TrimlineTests: [test]
        TrimlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Trimline.storekit
    test:
      config: Debug
      storeKitConfiguration: Trimline.storekit
      targets:
        - TrimlineTests
        - TrimlineUITests
    archive:
      config: Release
